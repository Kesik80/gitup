<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GitHub Uploader</title>
    <meta name="theme-color" content="#0a0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Cyberpunk-inspired palette */
            --bg-void: #0a0e14;
            --bg-deep: #101419;
            --bg-surface: #151a21;
            --bg-elevated: #1a1f27;
            
            --border-dim: rgba(139, 233, 253, 0.08);
            --border-bright: rgba(139, 233, 253, 0.25);
            
            --text-primary: #e6f1ff;
            --text-secondary: #8be9fd;
            --text-dim: #6272a4;
            
            --accent-cyan: #8be9fd;
            --accent-pink: #ff79c6;
            --accent-purple: #bd93f9;
            --accent-green: #50fa7b;
            --accent-yellow: #f1fa8c;
            --accent-orange: #ffb86c;
            --accent-red: #ff5555;
            
            --glow-cyan: 0 0 20px rgba(139, 233, 253, 0.4);
            --glow-pink: 0 0 20px rgba(255, 121, 198, 0.4);
            --glow-purple: 0 0 20px rgba(189, 147, 249, 0.4);
            
            --gradient-cyber: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
            --gradient-neon: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-purple) 50%, var(--accent-cyan) 100%);
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--border-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            pointer-events: none;
            animation: gridPulse 8s ease-in-out infinite;
        }
        
        @keyframes gridPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.4; }
        }
        
        /* Scan line effect */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(139, 233, 253, 0.03) 50%,
                transparent 100%
            );
            height: 100%;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }
        
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        .app {
            position: relative;
            z-index: 1;
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 0;
            margin-bottom: 32px;
            border-bottom: 2px solid var(--border-dim);
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 200px;
            height: 2px;
            background: var(--gradient-cyber);
            box-shadow: var(--glow-cyan);
            animation: headerGlow 3s ease-in-out infinite;
        }
        
        @keyframes headerGlow {
            0%, 100% { width: 200px; opacity: 0.6; }
            50% { width: 300px; opacity: 1; }
        }
        
        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: var(--gradient-cyber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: var(--glow-cyan);
            position: relative;
        }
        
        .logo::before {
            content: '▶';
            position: absolute;
            left: -30px;
            color: var(--accent-cyan);
            animation: blink 1.5s step-end infinite;
        }
        
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 20px;
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: 100px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .status.connected {
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 15px rgba(80, 250, 123, 0.2);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }
        
        .status.connected .status-dot {
            background: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s ease infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        
        /* Grid layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }
        
        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 420px 1fr;
            }
        }
        
        /* Card */
        .card {
            background: var(--bg-deep);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gradient-cyber);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .card:hover::before {
            opacity: 1;
        }
        
        .card-header {
            padding: 20px 24px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-dim);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-body {
            padding: 24px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .form-input,
        .form-select {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }
        
        .form-input:focus,
        .form-select:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(139, 233, 253, 0.1), var(--glow-cyan);
            background: var(--bg-elevated);
        }
        
        .form-input::placeholder {
            color: var(--text-dim);
        }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-cyber);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .btn:hover::before {
            opacity: 0.2;
        }
        
        .btn-primary {
            background: var(--gradient-cyber);
            color: var(--bg-void);
            font-weight: 700;
            box-shadow: var(--glow-cyan);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan), 0 8px 24px rgba(139, 233, 253, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-bright);
        }
        
        .btn-secondary:hover {
            background: var(--bg-surface);
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }
        
        .btn-success {
            background: var(--accent-green);
            color: var(--bg-void);
            width: 100%;
            padding: 16px;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(80, 250, 123, 0.3);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(80, 250, 123, 0.5), 0 8px 24px rgba(80, 250, 123, 0.3);
        }
        
        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
        }
        
        .btn-danger {
            background: var(--accent-red);
            color: var(--bg-void);
            box-shadow: 0 0 20px rgba(255, 85, 85, 0.3);
        }
        
        .btn-danger:hover {
            box-shadow: 0 0 30px rgba(255, 85, 85, 0.5);
        }
        
        /* Explorer */
        .explorer {
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            overflow: hidden;
            min-height: 500px;
        }
        
        @media (min-width: 1024px) {
            .explorer {
                height: calc(100vh - 200px);
                max-height: 900px;
            }
        }
        
        .explorer-toolbar {
            padding: 16px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .breadcrumb {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 0;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-cyan) transparent;
        }
        
        .breadcrumb::-webkit-scrollbar {
            height: 4px;
        }
        
        .breadcrumb::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 4px;
        }
        
        .breadcrumb-item {
            color: var(--accent-cyan);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .breadcrumb-item:hover {
            background: var(--bg-elevated);
            box-shadow: var(--glow-cyan);
        }
        
        .breadcrumb-item.current {
            color: var(--text-primary);
            cursor: default;
        }
        
        .breadcrumb-item.current:hover {
            background: transparent;
            box-shadow: none;
        }
        
        .breadcrumb-sep {
            color: var(--text-dim);
        }
        
        .explorer-actions-bar {
            padding: 8px 16px;
            background: rgba(139, 233, 253, 0.05);
            border-bottom: 1px solid var(--accent-cyan);
            display: none;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
        }
        
        .explorer-actions-bar.active {
            display: flex;
        }
        
        .explorer-selection-text {
            flex: 1;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent-cyan);
        }
        
        .explorer-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-cyan) transparent;
        }
        
        .explorer-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .explorer-content::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 4px;
        }
        
        .explorer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-dim);
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .explorer-item:hover {
            background: var(--bg-surface);
            border-left: 3px solid var(--accent-cyan);
            box-shadow: inset 0 0 20px rgba(139, 233, 253, 0.05);
        }
        
        .explorer-item.selected {
            background: rgba(139, 233, 253, 0.05);
            border-left: 3px solid var(--accent-purple);
        }
        
        .explorer-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-bright);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .explorer-checkbox.checked {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
            box-shadow: var(--glow-purple);
        }
        
        .explorer-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .explorer-icon.folder {
            background: linear-gradient(135deg, rgba(241, 250, 140, 0.1), rgba(241, 250, 140, 0.05));
            border-color: var(--accent-yellow);
        }
        
        .explorer-info {
            flex: 1;
            min-width: 0;
        }
        
        .explorer-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        
        .explorer-meta {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--text-dim);
        }
        
        .explorer-item-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .explorer-item:hover .explorer-item-actions {
            opacity: 1;
        }
        
        @media (hover: none) {
            .explorer-item-actions {
                opacity: 1;
            }
        }
        
        /* Drop zone */
        .drop-zone {
            border: 2px dashed var(--border-bright);
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-surface);
            position: relative;
            overflow: hidden;
        }
        
        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-neon);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .drop-zone:hover::before,
        .drop-zone.dragover::before {
            opacity: 0.05;
        }
        
        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }
        
        .drop-zone-content {
            position: relative;
            z-index: 1;
        }
        
        .drop-zone-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: var(--gradient-cyber);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow-cyan);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .drop-zone h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--gradient-cyber);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .drop-zone p {
            color: var(--text-dim);
            font-size: 14px;
        }
        
        /* File list */
        .file-grid {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }
        
        .file-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .file-card:hover {
            border-color: var(--accent-cyan);
            background: var(--bg-elevated);
            box-shadow: var(--glow-cyan);
        }
        
        .file-preview {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            background: var(--bg-deep);
            border: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .file-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .file-info {
            flex: 1;
            min-width: 0;
        }
        
        .file-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        
        .file-path {
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        
        .toast {
            background: var(--bg-elevated);
            border: 1px solid var(--border-bright);
            border-radius: 8px;
            padding: 16px 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 320px;
            max-width: 480px;
            pointer-events: auto;
            animation: toastSlide 0.3s ease;
        }
        
        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .toast.success {
            border-color: var(--accent-green);
            box-shadow: 0 0 20px rgba(80, 250, 123, 0.3);
        }
        
        .toast.error {
            border-color: var(--accent-red);
            box-shadow: 0 0 20px rgba(255, 85, 85, 0.3);
        }
        
        .toast-icon {
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .toast-text {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
        }
        
        /* Progress */
        .progress-wrapper {
            margin-top: 20px;
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }
        
        .progress-bar {
            height: 8px;
            background: var(--bg-surface);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-bar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-cyber);
            opacity: 0.2;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--gradient-cyber);
            border-radius: 100px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--accent-cyan);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 20, 0.9);
            backdrop-filter: blur(8px);
            z-index: 9998;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.open {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-surface);
            border: 1px solid var(--border-bright);
            border-radius: 12px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 0 40px rgba(139, 233, 253, 0.2);
            animation: modalZoom 0.3s ease;
        }
        
        .modal-content.large {
            max-width: 90vw;
            max-height: 90vh;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        @keyframes modalZoom {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .modal-header {
            margin-bottom: 20px;
        }
        
        .modal-content.large .modal-header {
            margin: 0;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .modal-body {
            margin-bottom: 24px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .modal-body input {
            width: 100%;
            margin-top: 12px;
        }
        
        .modal-content.large .modal-body {
            flex: 1;
            margin: 0;
            padding: 0;
            overflow: auto;
            background: var(--bg-deep);
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .modal-content.large .modal-actions {
            padding: 16px 24px;
            border-top: 1px solid var(--border-dim);
        }
        
        /* File preview */
        .file-preview-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        
        .file-preview-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }
        
        .file-preview-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            border-radius: 8px;
        }
        
        .file-preview-container pre {
            max-width: 100%;
            max-height: 100%;
            overflow: auto;
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-primary);
        }
        
        .file-preview-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: var(--text-secondary);
        }
        
        /* Context menu */
        .context-menu {
            position: fixed;
            background: var(--bg-elevated);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            min-width: 180px;
            z-index: 10000;
            padding: 8px 0;
            display: none;
        }
        
        .context-menu.open {
            display: block;
            animation: menuSlide 0.2s ease;
        }
        
        @keyframes menuSlide {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .context-menu-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .context-menu-item:hover {
            background: var(--bg-surface);
        }
        
        .context-menu-item.danger {
            color: var(--accent-red);
        }
        
        .context-menu-item.danger:hover {
            background: rgba(248, 81, 73, 0.1);
        }
        
        .context-menu-icon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-dim);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty state */
        .empty-state {
            padding: 64px 24px;
            text-align: center;
            color: var(--text-dim);
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* Destination indicator */
        .destination-indicator {
            padding: 12px 16px;
            background: rgba(139, 233, 253, 0.05);
            border: 1px solid var(--border-bright);
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }
        
        .destination-indicator strong {
            color: var(--accent-cyan);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            
            .explorer {
                min-height: 70vh;
                max-height: none;
            }
            
            .toast {
                min-width: auto;
                max-width: calc(100vw - 48px);
            }
        }
        
        /* Safe area */
        @supports (padding: env(safe-area-inset-top)) {
            .app {
                padding-top: calc(20px + env(safe-area-inset-top));
                padding-bottom: calc(20px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">GitUp</div>
            <div class="status" id="statusBadge">
                <span class="status-dot"></span>
                <span>Не подключено</span>
            </div>
        </header>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Left: Setup & Upload -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <!-- Connection -->
                <div class="card">
                    <div class="card-header">
                        <span>// Подключение</span>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <label class="form-label">GitHub Токен</label>
                            <input type="password" class="form-input" id="token" placeholder="ghp_xxxxxxxxxxxx" onkeypress="if(event.key==='Enter') connect()">
                        </div>
                        <button class="btn btn-primary" id="connectBtn" onclick="connect()" style="width: 100%;">
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                            </svg>
                            Подключить
                        </button>
                        <div class="form-group" style="margin-top: 20px;">
                            <label class="form-label">Репозиторий</label>
                            <select class="form-select" id="repository">
                                <option value="">Сначала подключитесь...</option>
                            </select>
                            <div style="display: flex; gap: 8px; margin-top: 8px;">
                                <button class="btn btn-secondary" onclick="createRepository()" style="flex: 1;">
                                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                                    </svg>
                                    Создать
                                </button>
                                <button class="btn btn-danger" onclick="deleteRepository()" style="flex: 1;">
                                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <polyline points="3 6 5 6 21 6"/>
                                        <path d="M19 6l-1 14H6L5 6"/>
                                    </svg>
                                    Удалить
                                </button>
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">Ветка</label>
                            <select class="form-select" id="branch">
                                <option value="main">main</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Upload -->
                <div class="card">
                    <div class="card-header">
                        <span>// Загрузка файлов</span>
                        <span id="fileCount" style="color: var(--text-dim);"></span>
                    </div>
                    <div class="card-body">
                        <div class="destination-indicator">
                            📁 Папка: <strong id="destinationPath">root</strong>
                        </div>
                        
                        <div class="drop-zone" id="dropZone">
                            <input type="file" id="fileInput" multiple style="display: none;">
                            <div class="drop-zone-content">
                                <div class="drop-zone-icon">
                                    <svg width="36" height="36" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                                    </svg>
                                </div>
                                <h3>Перетащите файлы сюда</h3>
                                <p>или нажмите для выбора</p>
                            </div>
                        </div>
                        
                        <div id="fileList" class="file-grid"></div>
                        
                        <div id="uploadProgress" style="display: none;" class="progress-wrapper">
                            <div class="progress-info">
                                <span id="progressLabel">Загрузка...</span>
                                <span id="progressPct">0%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                        </div>
                        
                        <button class="btn btn-success" id="uploadBtn" style="margin-top: 20px;">
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            Загрузить на GitHub
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Explorer -->
            <div class="explorer">
                <div class="explorer-toolbar">
                    <div class="breadcrumb" id="breadcrumb">
                        <span class="breadcrumb-item current">/</span>
                    </div>
                    <button class="btn btn-secondary btn-icon" id="pasteBtn" style="display:none;" onclick="pasteItems()" title="Вставить">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                        </svg>
                    </button>
                    <button class="btn btn-secondary btn-icon" title="Обновить" onclick="refreshExplorer()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                        </svg>
                    </button>
                    <button class="btn btn-secondary btn-icon" onclick="newFolder()" title="Новая папка">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                    </button>
                </div>
                
                <div class="explorer-actions-bar" id="explorerActions">
                    <div class="explorer-selection-text" id="selectionText">Выбрано: 0</div>
                    <button class="btn btn-secondary btn-icon" onclick="copySelected()" title="Копировать">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                    </button>
                    <button class="btn btn-secondary btn-icon" onclick="cutSelected()" title="Вырезать">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="6" cy="6" r="3"/>
                            <circle cx="6" cy="18" r="3"/>
                            <line x1="20" y1="4" x2="8.12" y2="15.88"/>
                            <line x1="14.47" y1="14.48" x2="20" y2="20"/>
                        </svg>
                    </button>
                    <button class="btn btn-danger btn-icon" onclick="deleteSelected()" title="Удалить">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6l-1 14H6L5 6"/>
                        </svg>
                    </button>
                    <button class="btn btn-secondary btn-icon" onclick="clearSelection()" title="Очистить">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                
                <div class="explorer-content" id="explorerContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <p>Connect to browse your repository</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <!-- Menu items populated dynamically -->
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Confirm</div>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                <button class="btn btn-danger" id="modalConfirm">Подтвердить</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let selectedFiles = [];
        let explorerPath = '';
        let explorerCache = {};
        let selectedItems = new Set();
        let clipboard = null;
        let isUploading = false;

        // Init
        const savedToken = localStorage.getItem('gh-token') || '';
        if (savedToken) {
            document.getElementById('token').value = savedToken;
            setTimeout(() => connect(), 100);
        }

        // Repository change
        document.getElementById('repository').addEventListener('change', async (e) => {
            const repo = e.target.value;
            localStorage.setItem('gh-repo', repo);
            if (repo) {
                await loadBranches();
                updateStatus(true);
                loadExplorer('');
            }
        });

        // Connect
        async function connect() {
            const token = document.getElementById('token').value.trim();
            if (!token) {
                toast('Введите GitHub токен', 'error');
                return;
            }

            localStorage.setItem('gh-token', token);

            const btn = document.getElementById('connectBtn');
            const orig = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Подключение...';

            try {
                const r = await fetch('https://api.github.com/user/repos?per_page=100&sort=updated', {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                if (!r.ok) throw new Error(r.status === 401 ? 'Неверный токен' : 'Ошибка подключения');

                const repos = await r.json();
                const sel = document.getElementById('repository');
                sel.innerHTML = '<option value="">Выберите репозиторий...</option>';

                repos.forEach(repo => {
                    const opt = document.createElement('option');
                    opt.value = repo.full_name;
                    opt.textContent = repo.full_name;
                    sel.appendChild(opt);
                });

                const saved = localStorage.getItem('gh-repo');
                if (saved && repos.find(r => r.full_name === saved)) {
                    sel.value = saved;
                    await loadBranches();
                    updateStatus(true);
                    loadExplorer('');
                }

                toast(`Подключено! ${repos.length} репозиториев`, 'success');
            } catch (e) {
                toast(e.message, 'error');
                updateStatus(false);
            } finally {
                btn.disabled = false;
                btn.innerHTML = orig;
            }
        }

        async function loadBranches() {
            const token = document.getElementById('token').value.trim();
            const repo = document.getElementById('repository').value;
            if (!repo) return;

            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/branches`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                const branches = await r.json();
                const sel = document.getElementById('branch');
                sel.innerHTML = '';

                branches.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b.name;
                    opt.textContent = b.name;
                    sel.appendChild(opt);
                });
            } catch (e) {
                toast('Не удалось загрузить ветки', 'error');
            }
        }

        function updateStatus(connected) {
            const badge = document.getElementById('statusBadge');
            if (connected) {
                badge.classList.add('connected');
                badge.querySelector('span:last-child').textContent = 'Подключено';
            } else {
                badge.classList.remove('connected');
                badge.querySelector('span:last-child').textContent = 'Не подключено';
            }
        }

        // Explorer
        async function loadExplorer(path) {
            explorerPath = path;
            selectedItems.clear();
            updateSelectionUI();
            updateBreadcrumb(path);
            updateDestination();

            const token = document.getElementById('token').value.trim();
            const repo = document.getElementById('repository').value;
            const branch = document.getElementById('branch').value;

            if (!repo) {
                document.getElementById('explorerContent').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📁</div><p>Подключитесь для просмотра</p></div>';
                return;
            }

            document.getElementById('explorerContent').innerHTML = '<div style="padding: 48px; text-align: center;"><div class="spinner" style="width: 24px; height: 24px;"></div></div>';

            try {
                const apiPath = path ? `contents/${path}` : 'contents';
                const r = await fetch(`https://api.github.com/repos/${repo}/${apiPath}?ref=${branch}&_=${Date.now()}`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                if (!r.ok) throw new Error('Ошибка загрузки');

                const items = await r.json();
                const sorted = items.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

                explorerCache[path] = sorted;
                renderExplorer(sorted);
            } catch (e) {
                document.getElementById('explorerContent').innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>${e.message}</p></div>`;
            }
        }

        function renderExplorer(items) {
            const container = document.getElementById('explorerContent');

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📂</div><p>Пустая папка</p></div>';
                return;
            }

            container.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'explorer-item';
                if (selectedItems.has(item.path)) div.classList.add('selected');

                const isDir = item.type === 'dir';
                const emoji = isDir ? '📁' : getFileEmoji(item.name);

                div.innerHTML = `
                    <div class="explorer-checkbox ${selectedItems.has(item.path) ? 'checked' : ''}" onclick="toggleSelect('${esc(item.path)}', event)">
                        ${selectedItems.has(item.path) ? '<svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="3"/></svg>' : ''}
                    </div>
                    <div class="explorer-icon ${isDir ? 'folder' : ''}">${emoji}</div>
                    <div class="explorer-info" ${isDir ? `onclick="closeContextMenu(); loadExplorer('${esc(item.path)}')"` : ''} style="${isDir ? 'cursor:pointer' : ''}">
                        <div class="explorer-name">${esc(item.name)}</div>
                        <div class="explorer-meta">${isDir ? 'Папка' : formatSize(item.size)}</div>
                    </div>
                    <div class="explorer-item-actions">
                        <button class="btn btn-secondary btn-icon" onclick="showItemMenu('${esc(item.path)}', '${esc(item.name)}', '${item.type}', event)" title="Меню">
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                                <circle cx="12" cy="5" r="2"/>
                                <circle cx="12" cy="12" r="2"/>
                                <circle cx="12" cy="19" r="2"/>
                            </svg>
                        </button>
                    </div>
                `;

                container.appendChild(div);
            });
        }

        function updateBreadcrumb(path) {
            const parts = path ? path.split('/') : [];
            let html = '';
            
            // Add back button if not at root
            if (path) {
                const parentPath = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
                html += `<button class="btn btn-secondary btn-icon" onclick="loadExplorer('${esc(parentPath)}')" title="Назад" style="margin-right: 8px;">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </button>`;
            }
            
            html += '<span class="breadcrumb-item" onclick="loadExplorer(\'\');">/</span>';

            parts.forEach((part, i) => {
                const subPath = parts.slice(0, i + 1).join('/');
                const isCurrent = i === parts.length - 1;
                html += '<span class="breadcrumb-sep">/</span>';
                html += `<span class="breadcrumb-item ${isCurrent ? 'current' : ''}" ${isCurrent ? '' : `onclick="loadExplorer('${esc(subPath)}')"`}>${esc(part)}</span>`;
            });

            document.getElementById('breadcrumb').innerHTML = html;
        }

        function updateDestination() {
            document.getElementById('destinationPath').textContent = explorerPath || 'root';
        }

        function refreshExplorer() {
            explorerCache = {};
            loadExplorer(explorerPath);
        }

        // Selection
        function toggleSelect(path, e) {
            e.stopPropagation();
            closeContextMenu(); // Close any open context menu
            if (selectedItems.has(path)) {
                selectedItems.delete(path);
            } else {
                selectedItems.add(path);
            }
            updateSelectionUI();
            renderExplorer(explorerCache[explorerPath]);
        }

        function updateSelectionUI() {
            const bar = document.getElementById('explorerActions');
            const text = document.getElementById('selectionText');
            const count = selectedItems.size;

            if (count > 0) {
                bar.classList.add('active');
                text.textContent = `Selected: ${count}`;
            } else {
                bar.classList.remove('active');
            }
        }

        function clearSelection() {
            selectedItems.clear();
            updateSelectionUI();
            renderExplorer(explorerCache[explorerPath]);
        }

        function getSelected() {
            const items = explorerCache[explorerPath] || [];
            return items.filter(i => selectedItems.has(i.path));
        }

        function copySelected() {
            const items = getSelected();
            if (items.length === 0) return;
            clipboard = { items, action: 'copy' };
            updatePasteButton();
            clearSelection();
            toast(`Скопировано: ${items.length}`, 'success');
        }

        function cutSelected() {
            const items = getSelected();
            if (items.length === 0) return;
            clipboard = { items, action: 'cut' };
            updatePasteButton();
            clearSelection();
            toast(`Вырезано: ${items.length}`, 'success');
        }

        function updatePasteButton() {
            const btn = document.getElementById('pasteBtn');
            if (clipboard && clipboard.items.length > 0) {
                btn.style.display = 'flex';
                btn.title = `Вставить (${clipboard.items.length})`;
            } else {
                btn.style.display = 'none';

        async function pasteItems() {
            if (!clipboard || clipboard.items.length === 0) return;

            const token = document.getElementById('token').value.trim();
            const repo = document.getElementById('repository').value;
            const branch = document.getElementById('branch').value;
            const destPath = explorerPath;

            for (const item of clipboard.items) {
                const newPath = destPath ? `${destPath}/${item.name}` : item.name;

                if (newPath === item.path) {
                    toast(`${item.name} уже здесь`, 'error');
                    continue;
                }

                if (item.type === 'dir') {
                    await copyFolderRecursive(token, repo, branch, item.path, newPath);
                    if (clipboard.action === 'cut') {
                        await deleteFolderRecursive(token, repo, branch, item.path);
                    }
                } else {
                    await copyFileContent(token, repo, branch, item.path, newPath, item.sha);
                    if (clipboard.action === 'cut') {
                        await deleteFile(token, repo, branch, item.path, item.sha);
                    }
                }
            }

            if (clipboard.action === 'cut') {
                clipboard = null;
                updatePasteButton();
            }

            await new Promise(r => setTimeout(r, 800));
            explorerCache = {};
            await loadExplorer(explorerPath);
            toast('Вставлено успешно', 'success');
        }

        async function copyFileContent(token, repo, branch, oldPath, newPath, sha) {
            const contentRes = await fetch(`https://api.github.com/repos/${repo}/contents/${oldPath}?ref=${branch}`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const fileData = await contentRes.json();

            await fetch(`https://api.github.com/repos/${repo}/contents/${newPath}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Copy ${oldPath} to ${newPath}`, content: fileData.content, branch })
            });
        }

        async function copyFolderRecursive(token, repo, branch, oldPath, newPath) {
            // Implementation for folder copy
            const branchRef = await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const branchData = await branchRef.json();
            const commitSha = branchData.object.sha;

            const treeRes = await fetch(`https://api.github.com/repos/${repo}/git/trees/${commitSha}?recursive=1`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const treeData = await treeRes.json();

            const copied = treeData.tree.filter(item => item.type === 'blob' && (item.path === oldPath || item.path.startsWith(oldPath + '/')))
                .map(item => ({
                    path: item.path.replace(oldPath, newPath),
                    mode: item.mode,
                    type: item.type,
                    sha: item.sha
                }));

            const existing = treeData.tree.filter(item => item.type === 'blob')
                .map(item => ({ path: item.path, mode: item.mode, type: item.type, sha: item.sha }));

            const merged = [...existing, ...copied];

            const newTreeRes = await fetch(`https://api.github.com/repos/${repo}/git/trees`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ tree: merged })
            });
            const newTree = await newTreeRes.json();

            const newCommitRes = await fetch(`https://api.github.com/repos/${repo}/git/commits`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Copy ${oldPath} to ${newPath}`, tree: newTree.sha, parents: [commitSha] })
            });
            const newCommit = await newCommitRes.json();

            await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ sha: newCommit.sha })
            });
        }

        async function downloadFile(path, name, e) {
            e.stopPropagation();

                });

        async function shareFile(path, name, e) {
            e.stopPropagation();

            const token = document.getElementById('token').value.trim();
            const repo = document.getElementById('repository').value;
            const branch = document.getElementById('branch').value;

            try {
                const url = `https://github.com/${repo}/blob/${branch}/${path}`;

                // Check if Web Share API is available
                if (!navigator.share) {
                    // Fallback: copy link to clipboard
                    await navigator.clipboard.writeText(url);
                    toast('Ссылка скопирована в буфер обмена', 'success');
                    return;
                }

                // Try to share the file itself if it's an image or small file
                const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                if (r.ok) {
                    const fileData = await r.json();
                    const ext = name.split('.').pop().toLowerCase();
                    const isImage = ['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext);
                    
                    // If it's an image and small enough, share the actual file
                    if (isImage && fileData.size < 5 * 1024 * 1024) { // < 5MB
                        const blob = base64ToBlob(fileData.content, `image/${ext}`);
                        const file = new File([blob], name, { type: `image/${ext}` });
                        
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({
                                files: [file],
                                title: name
                            });
                            toast('Файл отправлен', 'success');
                            return;
                        }
                    }
                }

                // Otherwise share the GitHub URL (clean, without extra text)
                await navigator.share({
                    title: name,
                    url: url
                });
                toast('Ссылка отправлена', 'success');
            } catch (e) {
                if (e.name === 'AbortError') {
                    // User cancelled share
                    return;
                }
                toast('Ошибка: ' + e.message, 'error');
            }
        }

        async function viewFile(path, name, e) {
            e.stopPropagation();

            const token = document.getElementById('token').value.trim();
            const repo = document.getElementById('repository').value;
            const branch = document.getElementById('branch').value;

            const ext = name.split('.').pop().toLowerCase();
            const isImage = ['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp', 'bmp'].includes(ext);
            const isPDF = ext === 'pdf';
            const isText = ['md', 'txt', 'json', 'js', 'ts', 'jsx', 'tsx', 'css', 'html', 'xml', 'yaml', 'yml', 'sh', 'py', 'java', 'c', 'cpp', 'h', 'rs'].includes(ext);
            const isMarkdown = ext === 'md';

            if (!isImage && !isPDF && !isText) {
                toast('Предпросмотр недоступен для этого типа файла', 'error');
                return;
            }

            // Open modal with loading
            const modal = document.getElementById('modal');
            const content = modal.querySelector('.modal-content');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            const actions = modal.querySelector('.modal-actions');

            content.classList.add('large');
            title.innerHTML = `
                <span>${name}</span>
                <button class="btn btn-secondary btn-icon" onclick="downloadCurrentFile()" title="Скачать" style="margin-left: auto;">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
                <button class="btn btn-secondary btn-icon" onclick="closeModal()" title="Закрыть">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            `;
            body.innerHTML = '<div class="file-preview-loading"><div class="spinner" style="width: 32px; height: 32px;"></div><p>Загрузка...</p></div>';
            actions.style.display = 'none';
            modal.classList.add('open');

            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=${branch}`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                if (!r.ok) throw new Error('Не удалось загрузить файл');

                const fileData = await r.json();
                currentViewFile = { path, name, content: fileData.content };
                const content = atob(fileData.content);

                let previewHTML = '';

                if (isImage) {
                    const blob = base64ToBlob(fileData.content, `image/${ext}`);
                    const url = URL.createObjectURL(blob);
                    previewHTML = `<div class="file-preview-container"><img src="${url}" alt="${esc(name)}"></div>`;
                } else if (isPDF) {
                    const blob = base64ToBlob(fileData.content, 'application/pdf');
                    const url = URL.createObjectURL(blob);
                    previewHTML = `<div class="file-preview-container"><iframe src="${url}"></iframe></div>`;
                } else if (isMarkdown) {
                    // Simple markdown rendering
                    const html = content
                        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                        .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                        .replace(/\*(.*)\*/gim, '<em>$1</em>')
                        .replace(/\n/gim, '<br>');
                    previewHTML = `<div class="file-preview-container"><div style="max-width: 800px; padding: 24px; color: var(--text-primary); line-height: 1.8;">${html}</div></div>`;
                } else if (isText) {
                    previewHTML = `<div class="file-preview-container"><pre>${esc(content)}</pre></div>`;
                }

                body.innerHTML = previewHTML;
            } catch (e) {
                body.innerHTML = `<div class="file-preview-loading"><div class="empty-state-icon">⚠️</div><p>${e.message}</p></div>`;
            }
        }

        function downloadCurrentFile() {
            if (!currentViewFile) return;
            
            const blob = base64ToBlob(currentViewFile.content, 'application/octet-stream');
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = currentViewFile.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            toast(`Файл "${currentViewFile.name}" скачан`, 'success');
        }

        function base64ToBlob(base64, type) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type });
        }

        function newFolder() {
            openModal(
                'Новая папка',
                `<input type="text" class="form-input" id="folderInput" placeholder="название-папки">`,
                async () => {

                    const repo = document.getElementById('repository').value;
                    const branch = document.getElementById('branch').value;
