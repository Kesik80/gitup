                    const filePath = `${folderPath}/.gitkeep`;

                    await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `Create ${folderPath}`, content: btoa(''), branch })
                    });

                    await new Promise(r => setTimeout(r, 800));
                    explorerCache = {};
                    await loadExplorer(explorerPath);
                    toast('Папка создана', 'success');
                }
            );
        }

        // File operations
        async function deleteFile(token, repo, branch, path, sha) {
            await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: 'DELETE',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Delete ${path}`, sha, branch })
            });
        }

        async function deleteFolderRecursive(token, repo, branch, path) {
            const branchRef = await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const branchData = await branchRef.json();
            const commitSha = branchData.object.sha;

            const commitInfo = await fetch(`https://api.github.com/repos/${repo}/git/commits/${commitSha}`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const commitData = await commitInfo.json();

            const treeRes = await fetch(`https://api.github.com/repos/${repo}/git/trees/${commitSha}?recursive=1`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const treeData = await treeRes.json();

            const kept = treeData.tree.filter(item => item.type === 'blob' && !item.path.startsWith(path + '/') && item.path !== path)
                .map(item => ({ path: item.path, mode: item.mode, type: item.type, sha: item.sha }));

            const newTreeRes = await fetch(`https://api.github.com/repos/${repo}/git/trees`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ tree: kept })
            });
            const newTree = await newTreeRes.json();

            const newCommitRes = await fetch(`https://api.github.com/repos/${repo}/git/commits`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Delete ${path}`, tree: newTree.sha, parents: [commitSha] })
            });
            const newCommit = await newCommitRes.json();

            await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ sha: newCommit.sha })
            });
        }

        async function renameFile(token, repo, branch, oldPath, newPath, sha) {
            const contentRes = await fetch(`https://api.github.com/repos/${repo}/contents/${oldPath}?ref=${branch}`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const fileData = await contentRes.json();

            await fetch(`https://api.github.com/repos/${repo}/contents/${newPath}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Rename ${oldPath} to ${newPath}`, content: fileData.content, branch })
            });

            await deleteFile(token, repo, branch, oldPath, fileData.sha);
        }

        async function renameFolderRecursive(token, repo, branch, oldPath, newPath) {
            const branchRef = await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const branchData = await branchRef.json();
            const commitSha = branchData.object.sha;

            const commitInfo = await fetch(`https://api.github.com/repos/${repo}/git/commits/${commitSha}`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const commitData = await commitInfo.json();

            const treeRes = await fetch(`https://api.github.com/repos/${repo}/git/trees/${commitSha}?recursive=1`, {
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            const treeData = await treeRes.json();

            const updatedTree = treeData.tree.filter(item => item.type === 'blob').map(item => {
                if (item.path === oldPath || item.path.startsWith(oldPath + '/')) {
                    return { path: item.path.replace(oldPath, newPath), mode: item.mode, type: item.type, sha: item.sha };
                }
                return { path: item.path, mode: item.mode, type: item.type, sha: item.sha };
            });

            const newTreeRes = await fetch(`https://api.github.com/repos/${repo}/git/trees`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ tree: updatedTree })
            });
            const newTree = await newTreeRes.json();

            const newCommitRes = await fetch(`https://api.github.com/repos/${repo}/git/commits`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Rename ${oldPath} to ${newPath}`, tree: newTree.sha, parents: [commitSha] })
            });
            const newCommit = await newCommitRes.json();

            await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ sha: newCommit.sha })
            });
        }

        // File upload
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); };
        fileInput.onchange = (e) => { handleFiles(e.target.files); fileInput.value = ''; };

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                selectedFiles.push({
                    id: Date.now() + Math.random(),
                    file,
                    name: file.name,
                    path: explorerPath ? `${explorerPath}/${file.name}` : file.name,
                    size: file.size
                });
            });
            renderFileList();
        }

        function renderFileList() {
            const container = document.getElementById('fileList');
            const count = document.getElementById('fileCount');

            if (selectedFiles.length === 0) {
                container.innerHTML = '';
                count.textContent = '';
                return;
            }

            count.textContent = `${selectedFiles.length} файл(ов)`;
            container.innerHTML = '';

            selectedFiles.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-card';

                const preview = file.file.type.startsWith('image/')
                    ? `<img src="${URL.createObjectURL(file.file)}" alt="">`
                    : getFileEmoji(file.name);

                div.innerHTML = `
                    <div class="file-preview">${preview}</div>
                    <div class="file-info">
                        <div class="file-name">${esc(file.name)}</div>
                        <div class="file-path">${esc(file.path)}</div>
                    </div>
                    <button class="btn btn-secondary btn-icon" onclick="renameUploadFile(${file.id})" title="Переименовать">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </button>
                    <button class="btn btn-secondary btn-icon" onclick="removeFile(${file.id})" title="Удалить">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                `;

                container.appendChild(div);
            });
        }

        function renameUploadFile(id) {
            const file = selectedFiles.find(f => f.id === id);
            if (!file) return;

            openModal(
                'Переименовать файл',
                `<input type="text" class="form-input" id="renameUploadInput" value="${esc(file.name)}">`,
                () => {
                    const newName = document.getElementById('renameUploadInput').value.trim();
                    if (!newName || newName === file.name) return;

                    file.name = newName;
                    file.path = explorerPath ? `${explorerPath}/${newName}` : newName;
                    renderFileList();
                    toast('Файл переименован', 'success');
                }
            );
        }

        function removeFile(id) {
            selectedFiles = selectedFiles.filter(f => f.id !== id);
            renderFileList();
        }

        // Upload
        document.getElementById('uploadBtn').onclick = async () => {
            if (isUploading || selectedFiles.length === 0) return;

            const token = document.getElementById('token').value.trim();
            const repo = document.getElementById('repository').value;
            const branch = document.getElementById('branch').value;

            if (!repo) {
                toast('Сначала выберите репозиторий', 'error');
                return;
            }

            isUploading = true;
            document.getElementById('uploadBtn').disabled = true;
            document.getElementById('uploadProgress').style.display = 'block';

            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                const refData = await r.json();
                const commitSha = refData.object.sha;

                const commitRes = await fetch(`https://api.github.com/repos/${repo}/git/commits/${commitSha}`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                const commitData = await commitRes.json();
                const baseTree = commitData.tree.sha;

                const blobs = [];

                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    const pct = Math.round((i / selectedFiles.length) * 100);

                    document.getElementById('progressFill').style.width = pct + '%';
                    document.getElementById('progressPct').textContent = pct + '%';
                    document.getElementById('progressLabel').textContent = `Загрузка ${file.name}...`;

                    const base64 = await fileToBase64(file.file);

                    const blobRes = await fetch(`https://api.github.com/repos/${repo}/git/blobs`, {
                        method: 'POST',
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: base64, encoding: 'base64' })
                    });

                    const blob = await blobRes.json();
                    blobs.push({ path: file.path, mode: '100644', type: 'blob', sha: blob.sha });
                }

                const treeRes = await fetch(`https://api.github.com/repos/${repo}/git/trees`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ base_tree: baseTree, tree: blobs })
                });

                const tree = await treeRes.json();

                const newCommitRes = await fetch(`https://api.github.com/repos/${repo}/git/commits`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Upload ${selectedFiles.length} file(s)`, tree: tree.sha, parents: [commitSha] })
                });

                const newCommit = await newCommitRes.json();

                await fetch(`https://api.github.com/repos/${repo}/git/refs/heads/${branch}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sha: newCommit.sha })
                });

                toast(`Загружено ${selectedFiles.length} файл(ов)`, 'success');
                selectedFiles = [];
                renderFileList();

                await new Promise(r => setTimeout(r, 1000));
                refreshExplorer();
            } catch (e) {
                toast('Ошибка загрузки: ' + e.message, 'error');
            } finally {
                isUploading = false;
                document.getElementById('uploadBtn').disabled = false;
                setTimeout(() => {
                    document.getElementById('uploadProgress').style.display = 'none';
                }, 1500);
            }
        };

        // Utilities
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
            });
        }

        function formatSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        function getFileEmoji(name) {
            const ext = name.split('.').pop().toLowerCase();
            const map = {
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', svg: '🎨', webp: '🖼️',
                mp4: '🎬', mov: '🎬', mp3: '🎵', wav: '🎵',
                pdf: '📄', zip: '📦', tar: '📦', gz: '📦',
                json: '📋', js: '📜', ts: '📜', jsx: '📜', tsx: '📜',
                html: '🌐', css: '🎨', md: '📝', txt: '📝',
                py: '🐍', sh: '⚙️', yml: '⚙️', yaml: '⚙️'
            };
            return map[ext] || '📄';
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function toast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icon = type === 'success' ? '✓' : '⚠️';

            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-text">${message}</div>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Modal
        let modalCallback = null;

        function openModal(title, body, onConfirm) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;
            modalCallback = onConfirm;
            document.getElementById('modal').classList.add('open');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const content = modal.querySelector('.modal-content');
            const actions = modal.querySelector('.modal-actions');
            modal.classList.remove('open');
            content.classList.remove('large');
            actions.style.display = 'flex';
            currentViewFile = null;
            modalCallback = null;
        }

        document.getElementById('modalConfirm').onclick = async () => {
            if (modalCallback) {
                await modalCallback();
                closeModal();
            }
        };

        document.getElementById('modal').onclick = (e) => {
            if (e.target.id === 'modal') closeModal();
        };
    </script>
</body>
</html>
